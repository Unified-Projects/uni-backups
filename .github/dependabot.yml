version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      production:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript*"
      dev-types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript*"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /apps/worker
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker)"
