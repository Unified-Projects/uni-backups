    </g>

    <g transform="translate(70, 0)">
      <rect x="0" y="20" width="60" height="50" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect x="0" y="35" width="60" height="35" rx="0" fill="url(#diskGrad)"/>
